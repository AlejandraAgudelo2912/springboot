<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"> <!--para usar los templates de thymeleaf hay que poner esto-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Document</title> <!--para usar thymeleaf se pone th: y lo que venga despues-->
</head>
<body>
    <h1 th:text="${title}"></h1>
    <ul>
        <li th:text="${name}"></li>
        <li th:text="${lastname}"></li>

    </ul>
    
</body>
</html>
